# gpt-oss-120b -- DISAGGREGATED (DGD, single-node colocated), B200, agentic -- Dynamo 1.3.0 / vLLM 0.23.
# 2 prefill + 6 decode as an operator-managed DynamoGraphDeployment. The operator injects kubernetes-native
# discovery (durable watch + resync) + NATS, so NO discovery env is hardcoded -- deploys on any
# operator cluster and has none of the raw-Pod file-KV timing fragility.
# podAffinity packs all 8 TP1 workers onto ONE node so NIXL P->D KV transfer stays on the NVLink
# fast path; EAGLE3 spec on both P and D. 2P6D is the best B200 split on the agentic trace -- see perf/README.md.
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: turbo-gptoss-120b-disagg-b200-agentic
  labels: {app.kubernetes.io/name: turbo-gptoss-120b-disagg-b200-agentic, app.kubernetes.io/part-of: nim-turbo-dynamo}
spec:
  backendFramework: vllm
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
              command: [python3]
              args: [-m, dynamo.frontend, --router-mode, kv, --router-kv-events, --kv-cache-block-size, "64", --trust-remote-code]
              resources: {requests: {cpu: "8", memory: "16Gi"}}
    - name: prefill
      type: prefill
      replicas: 2
      podTemplate:
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms: [{matchExpressions: [{key: nvidia.com/gpu.product, operator: In, values: [NVIDIA-B200]}]}]
            podAffinity:     # colocate all P+D workers on ONE node so NIXL P->D stays on the NVLink fast path
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - {key: nvidia.com/dynamo-graph-deployment-name, operator: In, values: [turbo-gptoss-120b-disagg-b200-agentic]}
                    topologyKey: kubernetes.io/hostname
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
              command: [python3, -m, dynamo.vllm]
              args:
                - --model=openai/gpt-oss-120b
                - --served-model-name=openai/gpt-oss-120b
                - --trust-remote-code
                - --quantization=mxfp4
                - --kv-cache-dtype=fp8
                - --max-model-len=131072
                - --gpu-memory-utilization=0.9
                - --block-size=64
                - --tensor-parallel-size=1          # TP1 worker (1 GPU); scale P:D via replicas
                - --max-num-batched-tokens=32768
                - --enable-chunked-prefill
                - --enable-prefix-caching
                - --async-scheduling
                - --no-disable-hybrid-kv-cache-manager
                - --enable-flashinfer-autotune
                - '--speculative-config={"method":"eagle3","model":"nvidia/gpt-oss-120b-Eagle3-v3","num_speculative_tokens":3}'   # EAGLE3 on BOTH P+D so draft-layer KV layout matches for NIXL
                - '--kv-transfer-config={"kv_connector":"NixlConnector","kv_role":"kv_both","kv_buffer_device":"cuda"}'
                - --disaggregation-mode=prefill
                - --dyn-reasoning-parser
                - gpt_oss
                - --dyn-tool-call-parser        # harmony tool-call parser: required for tool_calls to populate
                - harmony
              env:
                - {name: HF_HOME, value: /model-cache}
                - {name: VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8, value: "1"}   # B200 flashinfer_trtllm MXFP4xFP8
                - {name: TORCH_CUDA_ARCH_LIST, value: "10.0"}
                - {name: VLLM_ALLOW_CHUNKED_LOCAL_ATTN_WITH_HYBRID_KV_CACHE, value: "1"}
                - {name: TRITON_CACHE_DIR, value: /tmp/.triton-cache}
                - {name: VLLM_CACHE_ROOT, value: /tmp/vllm-cache}
                - {name: HF_MODULES_CACHE, value: /tmp/hf_modules}
              envFrom: [{secretRef: {name: hf-token-secret}}]
              resources: {requests: {nvidia.com/gpu: "1", memory: "200Gi"}, limits: {nvidia.com/gpu: "1"}}
              securityContext: {runAsUser: 0, capabilities: {add: ["SYS_PTRACE", "IPC_LOCK"]}}
              startupProbe: {failureThreshold: 60, httpGet: {path: /live, port: 9090}, periodSeconds: 60, timeoutSeconds: 20}
              volumeMounts: [{mountPath: /model-cache, name: model-cache}, {mountPath: /dev/shm, name: dshm}]
              workingDir: /workspace/
          volumes:
            - {name: model-cache, persistentVolumeClaim: {claimName: model-cache}}
            - {name: dshm, emptyDir: {medium: Memory, sizeLimit: 64Gi}}
          tolerations:
            - {key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule}
    - name: decode
      type: decode
      replicas: 6
      podTemplate:
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms: [{matchExpressions: [{key: nvidia.com/gpu.product, operator: In, values: [NVIDIA-B200]}]}]
            podAffinity:     # colocate all P+D workers on ONE node so NIXL P->D stays on the NVLink fast path
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - {key: nvidia.com/dynamo-graph-deployment-name, operator: In, values: [turbo-gptoss-120b-disagg-b200-agentic]}
                    topologyKey: kubernetes.io/hostname
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
              command: [python3, -m, dynamo.vllm]
              args:
                - --model=openai/gpt-oss-120b
                - --served-model-name=openai/gpt-oss-120b
                - --trust-remote-code
                - --quantization=mxfp4
                - --kv-cache-dtype=fp8
                - --max-model-len=131072
                - --gpu-memory-utilization=0.9
                - --block-size=64
                - --tensor-parallel-size=1          # TP1 worker (1 GPU); scale P:D via replicas
                - --max-num-batched-tokens=32768
                - --enable-chunked-prefill
                - --enable-prefix-caching
                - --async-scheduling
                - --no-disable-hybrid-kv-cache-manager
                - --enable-flashinfer-autotune
                - '--speculative-config={"method":"eagle3","model":"nvidia/gpt-oss-120b-Eagle3-v3","num_speculative_tokens":3}'   # EAGLE3 on BOTH P+D so draft-layer KV layout matches for NIXL
                - '--kv-transfer-config={"kv_connector":"NixlConnector","kv_role":"kv_both","kv_buffer_device":"cuda"}'
                - --disaggregation-mode=decode
                - --dyn-reasoning-parser
                - gpt_oss
                - --dyn-tool-call-parser        # harmony tool-call parser: required for tool_calls to populate
                - harmony
              env:
                - {name: HF_HOME, value: /model-cache}
                - {name: VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8, value: "1"}   # B200 flashinfer_trtllm MXFP4xFP8
                - {name: TORCH_CUDA_ARCH_LIST, value: "10.0"}
                - {name: VLLM_ALLOW_CHUNKED_LOCAL_ATTN_WITH_HYBRID_KV_CACHE, value: "1"}
                - {name: TRITON_CACHE_DIR, value: /tmp/.triton-cache}
                - {name: VLLM_CACHE_ROOT, value: /tmp/vllm-cache}
                - {name: HF_MODULES_CACHE, value: /tmp/hf_modules}
              envFrom: [{secretRef: {name: hf-token-secret}}]
              resources: {requests: {nvidia.com/gpu: "1", memory: "200Gi"}, limits: {nvidia.com/gpu: "1"}}
              securityContext: {runAsUser: 0, capabilities: {add: ["SYS_PTRACE", "IPC_LOCK"]}}
              startupProbe: {failureThreshold: 60, httpGet: {path: /live, port: 9090}, periodSeconds: 60, timeoutSeconds: 20}
              volumeMounts: [{mountPath: /model-cache, name: model-cache}, {mountPath: /dev/shm, name: dshm}]
              workingDir: /workspace/
          volumes:
            - {name: model-cache, persistentVolumeClaim: {claimName: model-cache}}
            - {name: dshm, emptyDir: {medium: Memory, sizeLimit: 64Gi}}
          tolerations:
            - {key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule}
